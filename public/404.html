<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        //
        const path = window.location.pathname + // Adjust this if your app is served from a subdirectory
         window.location.search + // Adjust this if your app uses query parameters
         window.location.hash; // Adjust this if your app uses hash-based routing
        sessionStorage.setItem('redirect', path);

        // IMPORTANT: adjust base path if needed
        const base = '/'; 
        window.location.replace(base);
      })();
    </script>
  </head>
  <body></body>
</html>
